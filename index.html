<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adventure Lab — Operaciones</title>
<link href="https://fonts.googleapis.com/css2?family=Asap:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --teal:    #5AC0C8;
  --teal-d:  #3a8a90;
  --teal-bg: rgba(90,192,200,0.08);
  --dark:    #2E282A;
  --dark2:   #3d3438;
  --dark3:   #4a3e43;
  --white:   #FFFFFF;
  --border:  rgba(90,192,200,0.15);
  --border2: rgba(90,192,200,0.28);
  --text:    #FFFFFF;
  --text2:   #9ecfd3;
  --text3:   #5a8a8e;
  --green:   #4caf7d;
  --green-bg:rgba(76,175,125,0.12);
  --amber:   #f0b429;
  --amber-bg:rgba(240,180,41,0.12);
  --red:     #e05252;
  --red-bg:  rgba(224,82,82,0.12);
  --orange:  #E94F25;
  --orange-bg:rgba(233,79,37,0.12);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:'Asap',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;}

.shell{display:grid;grid-template-columns:180px 1fr;grid-template-rows:58px 1fr;min-height:100vh;}

/* TOPBAR */
.topbar{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:var(--dark);border-bottom:1px solid var(--border2);}
.logo-area{display:flex;align-items:center;gap:12px;}
.logo-svg{width:32px;height:32px;flex-shrink:0;}
.logo-name{font-size:15px;font-weight:700;color:var(--white);letter-spacing:.04em;}
.logo-name span{color:var(--teal);}
.logo-tag{font-size:9px;color:var(--teal);font-style:italic;letter-spacing:.1em;margin-top:1px;}
.topbar-center{font-size:10px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--text3);}
.topbar-right{display:flex;align-items:center;gap:12px;}
.pending-badge{display:flex;align-items:center;gap:7px;padding:5px 12px;border-radius:3px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid rgba(224,82,82,.4);background:var(--red-bg);color:var(--red);transition:all .15s;}
.pending-badge.ok{border-color:rgba(90,192,200,.3);background:var(--teal-bg);color:var(--teal);}
.pending-dot{width:6px;height:6px;border-radius:50%;background:var(--red);animation:pulse 1.5s infinite;}
.pending-badge.ok .pending-dot{background:var(--teal);animation:none;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.last-upd{font-size:10px;color:var(--text3);}
.refresh-btn{font-size:11px;font-weight:600;padding:5px 14px;border:1px solid var(--teal-d);border-radius:3px;background:transparent;color:var(--teal);cursor:pointer;transition:all .15s;}
.refresh-btn:hover{background:var(--teal-bg);}

/* SIDEBAR */
.sidebar{background:var(--dark2);border-right:1px solid var(--border);padding:12px 0;overflow-y:auto;}
.nav-label{font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--text3);padding:0 14px;margin:14px 0 5px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 14px;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;border-left:2px solid transparent;transition:all .15s;}
.nav-item:hover{color:var(--white);background:var(--dark3);}
.nav-item.active{color:var(--teal);border-left-color:var(--teal);background:var(--teal-bg);}
.nav-icon{font-size:12px;width:14px;text-align:center;}
.nav-divider{height:1px;background:var(--border);margin:8px 14px;}

/* MAIN */
.main{padding:20px 22px;overflow-y:auto;background:var(--dark);}

/* SECTION HEADER */
.s-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.s-title{font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--text3);}
.s-sub{font-size:11px;color:var(--text3);}

/* METRIC CARDS */
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
.m-card{background:var(--dark2);border:1px solid var(--border);border-top:2px solid var(--teal);border-radius:5px;padding:14px 16px;animation:up .3s ease both;}
.m-card:nth-child(2){animation-delay:.05s}.m-card:nth-child(3){animation-delay:.1s}.m-card:nth-child(4){animation-delay:.15s}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.m-lbl{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:6px;}
.m-val{font-size:26px;font-weight:700;color:var(--white);}
.m-sub{font-size:11px;color:var(--text2);margin-top:3px;}

/* KPI CARDS */
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px;}
.k-card{background:var(--dark2);border:1px solid var(--border);border-radius:5px;padding:12px 13px;cursor:pointer;transition:all .2s;}
.k-card:hover{border-color:var(--border2);transform:translateY(-1px);}
.k-card.active{border-color:var(--teal);}
.k-card.c-g{border-left:3px solid var(--teal);}
.k-card.c-a{border-left:3px solid var(--amber);}
.k-card.c-r{border-left:3px solid var(--red);}
.k-card.c-n{border-left:3px solid var(--text3);}
.k-top{display:flex;justify-content:space-between;margin-bottom:7px;}
.k-name{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text2);}
.k-wt{font-size:9px;color:var(--text3);}
.k-val{font-size:22px;font-weight:700;margin-bottom:5px;}
.k-val.g{color:var(--teal)}.k-val.a{color:var(--amber)}.k-val.r{color:var(--red)}.k-val.n{color:var(--text3)}
.k-bar{height:2px;background:var(--border);border-radius:1px;margin-bottom:5px;overflow:hidden;}
.k-fill{height:100%;border-radius:1px;transition:width 1s ease;}
.f-g{background:var(--teal)}.f-a{background:var(--amber)}.f-r{background:var(--red)}.f-n{background:var(--text3)}
.k-meta{font-size:9px;color:var(--text3);}
.badge{display:inline-block;font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:1px 6px;border-radius:2px;margin-bottom:5px;}
.b-g{background:var(--teal-bg);color:var(--teal)}.b-a{background:var(--amber-bg);color:var(--amber)}.b-r{background:var(--red-bg);color:var(--red)}.b-n{background:rgba(255,255,255,.05);color:var(--text3)}

/* DETAIL PANEL */
.detail{background:var(--dark2);border:1px solid var(--border2);border-radius:5px;padding:16px 18px;margin-bottom:16px;display:none;}
.detail.vis{display:block;animation:up .2s ease;}
.d-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.d-title{font-size:13px;font-weight:700;color:var(--white);}
.close-btn{font-size:10px;padding:3px 8px;border:1px solid var(--border2);border-radius:3px;background:transparent;color:var(--text3);cursor:pointer;}
.d-cols{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.d-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;}
.d-row:last-child{border-bottom:none;}
.d-k{color:var(--text2);}
.d-v{font-size:11px;color:var(--white);}
.d-v.g{color:var(--teal)}.d-v.a{color:var(--amber)}.d-v.r{color:var(--red)}
.sub-t{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;}

/* BOTTOM GRID */
.bot-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px;}
.panel{background:var(--dark2);border:1px solid var(--border);border-radius:5px;padding:13px 15px;}
.p-title{font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--text3);margin-bottom:10px;}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.b-lbl{font-size:11px;color:var(--text2);width:80px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.b-track{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
.b-fill{height:100%;background:var(--teal);border-radius:2px;transition:width .8s ease;}
.b-val{font-size:11px;color:var(--white);font-weight:600;width:60px;text-align:right;}

/* TABLE */
.tbl-wrap{background:var(--dark2);border:1px solid var(--border);border-radius:5px;overflow:hidden;margin-bottom:16px;}
.tbl-hdr{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;border-bottom:1px solid var(--border);}
table{width:100%;border-collapse:collapse;font-size:11px;}
th{text-align:left;padding:8px 12px;font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border);background:var(--dark3);}
td{padding:8px 12px;color:var(--text2);border-bottom:1px solid var(--border);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--dark3);}
.pill{display:inline-block;font-size:9px;font-weight:700;padding:2px 7px;border-radius:2px;letter-spacing:.04em;}
.p-ok{background:var(--teal-bg);color:var(--teal);}
.p-pend{background:var(--amber-bg);color:var(--amber);}
.p-bad{background:var(--red-bg);color:var(--red);}
.p-off{background:rgba(255,255,255,.05);color:var(--text3);}
.cat-tag{display:inline-block;font-size:9px;font-weight:600;padding:1px 6px;border-radius:2px;background:var(--teal-bg);color:var(--teal);}
.ext-tag{display:inline-block;font-size:9px;font-weight:600;padding:1px 6px;border-radius:2px;background:var(--orange-bg);color:var(--orange);}

/* APPROVE BUTTON */
.approve-btn{font-size:10px;font-weight:700;padding:4px 12px;border:1px solid var(--teal);border-radius:3px;background:transparent;color:var(--teal);cursor:pointer;transition:all .15s;letter-spacing:.05em;}
.approve-btn:hover{background:var(--teal);color:var(--dark);}
.approve-btn:disabled{opacity:.4;cursor:not-allowed;}
.approve-btn.loading{opacity:.6;}

/* AVAILABILITY CARD */
.avail-card{background:var(--dark2);border:1px solid var(--border);border-radius:5px;padding:12px 14px;margin-bottom:8px;}
.avail-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.avail-name{font-size:13px;font-weight:600;color:var(--white);}
.avail-time{font-size:11px;color:var(--text3);}
.avail-meta{display:flex;gap:16px;font-size:11px;color:var(--text2);}
.avail-crew{font-size:10px;color:var(--text3);margin-top:6px;}
.avail-bookings{margin-top:8px;border-top:1px solid var(--border);padding-top:8px;}

/* RESOURCE GRID */
.res-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.res-card{background:var(--dark3);border:1px solid var(--border);border-radius:4px;padding:10px 12px;}
.res-name{font-size:12px;font-weight:600;color:var(--white);margin-bottom:3px;}
.res-meta{font-size:10px;color:var(--text3);}
.res-status{font-size:9px;font-weight:700;margin-top:5px;}
.rs-op{color:var(--teal)}.rs-off{color:var(--red)}.rs-ext{color:var(--orange);}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;height:200px;flex-direction:column;gap:10px;color:var(--text3);font-size:12px;}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{color:var(--text3);font-size:11px;text-align:center;padding:14px 0;}
</style>
</head>
<body>
<div class="shell">

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo-area">
    <svg class="logo-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M50 8 L88 82 H66 L50 46 L34 82 H12 Z" fill="#5AC0C8"/>
      <path d="M37 64 H63 L58 76 H42 Z" fill="#2E282A"/>
    </svg>
    <div>
      <div class="logo-name"><span>ADVENTURE</span>LAB®</div>
      <div class="logo-tag">Discover pure nature</div>
    </div>
  </div>
  <div class="topbar-center">Panel de Operaciones</div>
  <div class="topbar-right">
    <div class="pending-badge" id="pendingBadge" onclick="setView('validation',null)">
      <div class="pending-dot"></div>
      <span id="pendingText">Cargando...</span>
    </div>
    <div class="last-upd" id="lastUpd">—</div>
    <button class="refresh-btn" onclick="loadAll()">↺ Actualizar</button>
  </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="nav-label">Vistas</div>
  <div class="nav-item active" onclick="setView('ops',this)"><span class="nav-icon">◉</span> Operaciones</div>
  <div class="nav-item" onclick="setView('validation',this)"><span class="nav-icon">✓</span> Validación</div>
  <div class="nav-item" onclick="setView('kpi',this)"><span class="nav-icon">◈</span> KPIs</div>
  <div class="nav-item" onclick="setView('tours',this)"><span class="nav-icon">◇</span> Tours</div>
  <div class="nav-item" onclick="setView('bookings',this)"><span class="nav-icon">◆</span> Bookings</div>
  <div class="nav-divider"></div>
  <div class="nav-label">Referencia</div>
  <div class="nav-item" onclick="setView('resources',this)"><span class="nav-icon">◁</span> Resources</div>
  <div class="nav-item" onclick="setView('crew',this)"><span class="nav-icon">◎</span> Crew</div>
  <div class="nav-item" onclick="setView('items',this)"><span class="nav-icon">▣</span> Items</div>
  <div class="nav-divider"></div>
  <div class="nav-item" id="connStatus"><span class="nav-icon" style="color:var(--text3)">●</span> Conectando...</div>
</div>

<!-- MAIN -->
<div class="main" id="main">
  <div class="loading"><div class="spinner"></div>Cargando datos...</div>
</div>

</div>
<script>
const PUB_ID = '2PACX-1vTvE0XPLrdmmapuFvftdpfu3i2nToHOc-kaCP2ZzUt39QSReR5IezPCM4UJ_h79QjtQ4EFat2F6KxN8';
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzMJBV4E3wFIH_Nij3fpSw_5JBPI0rUCS52kquQLb6eaGGPOcbP3md6ZYENruIk4W_oCg/exec';

const GIDS = {
  'Bookings':      1099896527,
  'Resources':     1311481255,
  'Items':         1880915156,
  'Crew':          859145813,
  'Daily Summary': 1788539460,
  'KPI Summary':   1723578725,
};

// External resources — cost tracked separately, not in KPI
const EXTERNAL_RESOURCES = ['Ramona', 'Skybell', 'La Ramona'];

// Tour category mapping
const TOUR_CATEGORIES = {
  'Vela':   ['Sailing Tour','Private Catamaran','Private Monohull','Hobie Cat','Velero','Catamarán','Catamaran','Monocasco'],
  'Motor':  ['Boat Tour','Private Boat Tour','Pontón','Ponton','Sunday FUNDAY','Ramona','Carmelita Private Boat','Healing','Mayan'],
  'Paddle': ['Paddleboard','SUP','Kayak Tour','Sunrise Kayak','Sunset Kayak','Yoga'],
  'Renta':  ['Rental','Renta'],
};

function getTourCategory(name) {
  if (!name) return 'Otro';
  const n = name.toLowerCase();
  for (const [cat, keywords] of Object.entries(TOUR_CATEGORIES)) {
    if (keywords.some(k => n.includes(k.toLowerCase()))) return cat;
  }
  return 'Otro';
}

// State
let daily=[], kpi=[], bookings=[], resources=[], items=[], crew=[];
let currentView='ops';

// ---- DATE HELPERS ----
function fmtDate(val) {
  if (!val) return '—';
  // Handle Google Sheets date serial or string
  let d;
  if (typeof val === 'number') {
    // Google Sheets date serial
    d = new Date((val - 25569) * 86400 * 1000);
  } else {
    d = new Date(val);
  }
  if (isNaN(d)) return val;
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const yy = String(d.getFullYear()).slice(-2);
  return `${dd}/${mm}/${yy}`;
}

function fmtTime(val) {
  if (!val) return '—';
  // Already in HH:MM format
  if (typeof val === 'string' && val.includes(':')) return val.substring(0,5);
  return val;
}

function fmtMXN(val) {
  const n = parseFloat(val) || 0;
  return '$' + Math.round(n).toLocaleString('es-MX');
}

// ---- ACTUAL PEOPLE COUNT from Raw JSON ----
function getActualPeople(row) {
  // First try the actual_people_count column if it exists
  const actual = parseFloat(row['# People (actual)']);
  if (actual && actual > 0) return actual;

  // Fall back to parsing Raw JSON
  const raw = row['Raw JSON'];
  if (!raw) return parseFloat(row['# People (FH)']) || parseFloat(row['# People']) || 0;

  try {
    const booking = JSON.parse(raw).booking;
    if (!booking || !booking.customers) return booking.customer_count || 0;

    const peopleKeywords = ['personas','people','kayak','cuantas','how many','numero de'];
    let total = 0;

    booking.customers.forEach(function(c) {
      let foundField = false;
      if (c.custom_field_values) {
        c.custom_field_values.forEach(function(cfv) {
          const fname = (cfv.name || '').toLowerCase();
          const isMatch = peopleKeywords.some(k => fname.includes(k));
          if (isMatch && cfv.display_value && !isNaN(parseInt(cfv.display_value))) {
            total += parseInt(cfv.display_value);
            foundField = true;
          }
        });
      }
      if (!foundField) total += 1;
    });

    return total > 0 ? total : (booking.customer_count || 0);
  } catch(e) {
    return parseFloat(row['# People (FH)']) || parseFloat(row['# People']) || 0;
  }
}

// ---- REVENUE — always use receipt_total ----
function getRevenue(row) {
  const rt = parseFloat(row['Receipt Total (MXN)']) || 0;
  if (rt > 0) return rt;
  // fallback
  return parseFloat(row['Invoice Price (MXN)']) || 0;
}

// ---- FETCH ----
async function fetchTab(name) {
  const gid = GIDS[name];
  const url = `https://docs.google.com/spreadsheets/d/e/${PUB_ID}/pub?output=csv&gid=${gid}`;
  try {
    const r = await fetch(url);
    const t = await r.text();
    if (!t || t.includes('<!DOCTYPE')) return [];

    const rows = t.split('\n').map(row => {
      // Parse CSV properly handling quoted fields
      const cells = [];
      let cur = '', inQ = false;
      for (let i = 0; i < row.length; i++) {
        if (row[i] === '"') { inQ = !inQ; }
        else if (row[i] === ',' && !inQ) { cells.push(cur.trim()); cur = ''; }
        else { cur += row[i]; }
      }
      cells.push(cur.trim());
      return cells;
    });

    if (rows.length < 2) return [];
    const headers = rows[0];
    return rows.slice(1)
      .filter(r => r.some(v => v !== ''))
      .map(r => headers.reduce((o, h, i) => {
        o[h] = r[i] || '';
        return o;
      }, {}));
  } catch(e) {
    console.error('Error fetching ' + name, e);
    return [];
  }
}

async function loadAll() {
  document.getElementById('main').innerHTML = '<div class="loading"><div class="spinner"></div>Actualizando...</div>';
  try {
    [daily, kpi, bookings, resources, items, crew] = await Promise.all([
      fetchTab('Daily Summary').catch(()=>[]),
      fetchTab('KPI Summary').catch(()=>[]),
      fetchTab('Bookings').catch(()=>[]),
      fetchTab('Resources').catch(()=>[]),
      fetchTab('Items').catch(()=>[]),
      fetchTab('Crew').catch(()=>[]),
    ]);
    document.getElementById('lastUpd').textContent = 'Actualizado: '+new Date().toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit',hour12:false});
    document.getElementById('connStatus').innerHTML = '<span class="nav-icon" style="color:var(--teal)">●</span> Conectado';
    updatePending();
    render();
  } catch(e) {
    document.getElementById('main').innerHTML = '<div class="loading">Error cargando datos.</div>';
    document.getElementById('connStatus').innerHTML = '<span class="nav-icon" style="color:var(--red)">●</span> Error';
  }
}

function updatePending() {
  const n = daily.filter(r=>r['Validation Status']==='Pending').length;
  const b = document.getElementById('pendingBadge');
  document.getElementById('pendingText').textContent = n>0 ? n+(n===1?' día pendiente':' días pendientes') : 'Todo aprobado';
  b.className = n>0 ? 'pending-badge' : 'pending-badge ok';
}

// ---- APPROVE — calls Apps Script to update sheet ----
async function approveDay(dateStr, btnEl) {
  btnEl.disabled = true;
  btnEl.textContent = '...';
  btnEl.classList.add('loading');
  try {
    await fetch(SCRIPT_URL + '?action=approve&date=' + encodeURIComponent(dateStr), {
      method: 'GET', mode: 'no-cors'
    });
    // Optimistically update UI
    const row = daily.find(r=>r['Date']===dateStr);
    if (row) row['Validation Status'] = 'Approved';
    updatePending();
    renderValidation();
  } catch(e) {
    btnEl.textContent = 'Error';
    btnEl.disabled = false;
  }
}

// ---- VIEW CONTROL ----
function setView(v,el) {
  currentView=v;
  document.querySelectorAll('.nav-item').forEach(i=>i.classList.remove('active'));
  if(el) el.classList.add('active');
  render();
}

function render() {
  if(currentView==='ops')        renderOps();
  else if(currentView==='validation') renderValidation();
  else if(currentView==='kpi')   renderKPI();
  else if(currentView==='tours') renderTours();
  else if(currentView==='bookings') renderBookings();
  else if(currentView==='resources') renderResources();
  else if(currentView==='crew')  renderCrew();
  else if(currentView==='items') renderItems();
}

// ---- HELPERS ----
function sumF(arr,fn){ return arr.reduce((s,r)=>s+(fn(r)||0),0); }
function n(v){ return parseFloat(v)||0; }
function pill(st){
  if(!st) return '';
  if(st==='booked'||st==='on'||st==='active'||st==='Approved') return `<span class="pill p-ok">${st}</span>`;
  if(st==='cancelled'||st==='out_of_service'||st==='Issue') return `<span class="pill p-bad">${st}</span>`;
  if(st==='Pending'||st==='leaving') return `<span class="pill p-pend">${st}</span>`;
  return `<span class="pill p-off">${st}</span>`;
}
function kpiColor(val,target,inv){
  if(val===''||val===null||val===undefined||isNaN(parseFloat(val))) return 'n';
  val=parseFloat(val);
  if(inv) return val<=target?'g':val<=target*1.5?'a':'r';
  return val>=target?'g':val>=target*.85?'a':'r';
}
function kpiBadge(c){ return `<span class="badge b-${c}">${{g:'En meta',a:'Atención',r:'Bajo meta',n:'Sin datos'}[c]}</span>`; }
function barRow(lbl,val,max,display){
  const pct=max>0?Math.min(100,(val/max)*100):0;
  return `<div class="bar-row"><div class="b-lbl">${lbl}</div><div class="b-track"><div class="b-fill" style="width:${pct}%"></div></div><div class="b-val">${display}</div></div>`;
}
function isExternalResource(resName) {
  return EXTERNAL_RESOURCES.some(e => (resName||'').toLowerCase().includes(e.toLowerCase()));
}

// ---- TOURS VIEW — grouped by availability pk ----
function renderTours() {
  const booked = bookings.filter(b=>b['Status']==='booked');

  // Group by availability pk
  const availMap = {};
  booked.forEach(b=>{
    const apk = b['availability > pk'] || b['Tour ID (PK)'] || b['Booking ID'];
    const key = (b['Tour Date']||'') + '_' + apk;
    if (!availMap[key]) {
      availMap[key] = {
        availPk: apk,
        tourName: b['Tour Name'] || '—',
        date: b['Tour Date'] || '',
        time: b['Tour Time'] || '',
        marina: b['Marina'] || '—',
        affiliate: b['Affiliate'] || 'Direct',
        bookings: [],
        totalPeople: 0,
        totalRevenue: 0,
        crew: '',
      };
    }
    availMap[key].bookings.push(b);
    availMap[key].totalPeople += getActualPeople(b);
    availMap[key].totalRevenue += getRevenue(b);

    // Extract crew from raw JSON
    if (!availMap[key].crew && b['Raw JSON']) {
      try {
        const bk = JSON.parse(b['Raw JSON']).booking;
        if (bk && bk.availability && bk.availability.crew_members && bk.availability.crew_members.length>0) {
          availMap[key].crew = bk.availability.crew_members.map(c=>
            c.user.name + (c.role?` (${c.role.short_name})`:'')
          ).join(' · ');
        }
      } catch(e){}
    }
  });

  const tours = Object.values(availMap).sort((a,b)=>{
    if(b.date!==a.date) return b.date.localeCompare(a.date);
    return (b.time||'').localeCompare(a.time||'');
  });

  const totalTours = tours.length;
  const totalPeople = tours.reduce((s,t)=>s+t.totalPeople,0);
  const totalRevenue = tours.reduce((s,t)=>s+t.totalRevenue,0);

  document.getElementById('main').innerHTML = `
    <div class="s-hdr">
      <div class="s-title">Tours — por availability</div>
      <div class="s-sub">${totalTours} tours · ${totalPeople} personas · ${fmtMXN(totalRevenue)}</div>

      <div class="m-card"><div class="m-lbl">Personas operadas</div><div class="m-val">${totalPeople}</div></div>
      <div class="m-card"><div class="m-lbl">Ingresos totales</div><div class="m-val">${fmtMXN(totalRevenue)}</div></div>
    </div>
    <div class="tbl-wrap">
      <div class="tbl-hdr">
        <div class="s-title">Todos los tours</div>
        <div class="s-sub">${totalTours} availabilities</div>
      </div>
      <table>
        <thead><tr><th>Fecha</th><th>Hora</th><th>Tour</th><th>Categoría</th><th>Personas</th><th>Ingresos</th><th>Marina</th><th>Affiliate</th><th>Crew</th><th>Bookings</th></tr></thead>
        <tbody>
          ${tours.slice(0,60).map(t=>`<tr>
            <td style="color:var(--white);font-weight:600">${fmtDate(t.date)}</td>
            <td>${fmtTime(t.time)}</td>

          <td style="color:var(--white)">${fmtDate(b['Tour Date'])}</td>
          <td>${fmtTime(b['Tour Time'])}</td>
          <td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${b['Tour Name']||'—'}</td>
          <td><span class="cat-tag">${getTourCategory(b['Tour Name'])}</span></td>
          <td>${b['Contact Name']||'—'}</td>
          <td style="color:var(--teal);font-weight:600">${getActualPeople(b)}</td>
          <td style="color:var(--text3)">${b['Affiliate']||'Direct'}</td>
          <td>${b['Marina']||'—'}</td>
          <td style="color:var(--teal);font-weight:600">${fmtMXN(getRevenue(b))}</td>
          <td>${pill(b['Status']||'')}</td>
        </tr>`).join('')||'<tr><td colspan="10" class="empty">Sin bookings</td></tr>'}
      </tbody>
    </table></div>`;
}

// ---- KPI VIEW ----
function renderKPI() {
  if(!kpi.length){ document.getElementById('main').innerHTML='<div class="loading">Sin datos de KPI aún</div>'; return; }
  document.getElementById('main').innerHTML = `
    <div class="s-hdr"><div class="s-title">KPI semanal</div><div class="s-sub">Bono 2% venta neta</div></div>
    <div style="padding:10px 14px;background:var(--dark2);border:1px solid var(--border);border-radius:5px;font-size:11px;color:var(--text3);margin-bottom:14px">
      <strong style="color:var(--teal)">Columnas manuales (Google Sheets → KPI Summary):</strong> Cost Ratio % · Deny Service % · Uptime % · Checklist % · Reviews Coverage % · 5-Star %
    </div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>Semana</th><th>Aprobados</th><th>Tours</th><th>Ingresos</th><th>Costos %</th><th>Negados %</th><th>Uptime %</th><th>Checklist %</th><th>Reviews %</th><th>5★ %</th><th>Score</th></tr></thead>
      <tbody>
        ${[...kpi].reverse().map(r=>{
          const sc=parseFloat(r['Total KPI Score']);
          const sc_col=!isNaN(sc)?(sc>=85?'var(--teal)':sc>=70?'var(--amber)':'var(--red)'):'var(--text3)';
          return `<tr>
            <td style="color:var(--white)">${fmtDate(r['Week Start'])}</td>
            <td>${r['Days Approved']||0}/${n(r['Days Approved'])+n(r['Days Pending'])}</td>
            <td>${r['Tours (approved)']||0}</td>
            <td style="color:var(--teal)">${fmtMXN(n(r['Revenue (MXN)']))}</td>
            <td>${r['Cost Ratio %']||'—'}</td>
            <td>${r['Deny Service %']||'—'}</td>
            <td>${r['Uptime %']||'—'}</td>
            <td>${r['Checklist %']||'—'}</td>
            <td>${r['Reviews Coverage %']||'—'}</td>
            <td>${r['5-Star %']||'—'}</td>
            <td style="color:${sc_col};font-weight:700;font-size:14px">${!isNaN(sc)?sc+'%':'—'}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table></div>`;
}

// ---- RESOURCES VIEW ----
function renderResources() {
  const marinaGroups={};
  resources.forEach(r=>{
    const m=r['marina — operating location']||'Sin marina';
    if(!marinaGroups[m]) marinaGroups[m]=[];
    marinaGroups[m].push(r);
  });
  document.getElementById('main').innerHTML = `
    <div class="s-hdr">
      <div class="s-title">Resources</div>
      <div class="s-sub">${resources.filter(r=>r['status — active or out_of_service']==='active').length} activos · ${resources.filter(r=>r['status — active or out_of_service']==='out_of_service').length} fuera de servicio</div>
    </div>
    ${Object.entries(marinaGroups).map(([marina,res])=>`
      <div style="margin-bottom:16px">
        <div class="s-hdr"><div class="s-title">${marina}</div></div>
        <div class="res-grid">
          ${res.map(r=>{
            const op=r['status — active or out_of_service']==='active';
            const ext=isExternalResource(r['name — resource name']);
            return `<div class="res-card" style="border-left:3px solid ${ext?'var(--orange)':op?'var(--teal)':'var(--red)'}">
              <div class="res-name">${r['name — resource name']||'—'}</div>
              <div class="res-meta">${r['type — type of resource']||'—'} · cap. ${r['max_uses — capacity / max concurrent uses']||'—'}</div>
              ${r['notes — internal notes']?`<div class="res-meta" style="margin-top:2px">${r['notes — internal notes']}</div>`:''}
              <div class="res-status ${ext?'rs-ext':op?'rs-op':'rs-off'}">${ext?'● Externo':op?'● Operativo':'● Fuera servicio'}</div>
            </div>`;
          }).join('')}
        </div>
      </div>
    `).join('')}
    <div style="padding:8px 12px;background:var(--dark2);border:1px solid var(--border);border-radius:4px;font-size:10px;color:var(--text3)">
      <span style="color:var(--orange)">● Externo</span> = resource de terceros (Ramona, Skybell) — costo se registra por separado · Para editar: Google Sheets → <strong style="color:var(--teal)">Resources</strong>
    </div>`;
}

      <div class="s-sub">${crew.filter(c=>c['status — active, leaving, or inactive']==='active').length} activos</div>

      <thead><tr><th>Nombre</th><th>Username</th><th>Role</th><th>Group</th><th>Marina</th><th>Status</th></tr></thead>

        ${crew.map(c=>`<tr>
          <td style="color:var(--white);font-weight:500">${c['name — full name']||'—'}</td>
          <td style="color:var(--text3)">${c['username — FareHarbor username']||'—'}</td>
          <td>${c['role — crew role in FareHarbor']||'—'}</td>

}

// ---- ITEMS VIEW ----
function renderItems() {

    <div class="s-hdr">
      <div class="s-title">Items (productos)</div>
      <div class="s-sub">${items.filter(i=>i['status — on or off']==='on').length} activos · ${items.length} total</div>
    </div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>ID</th><th>Nombre</th><th>Categoría</th><th>Marina</th><th>Duración</th><th>Tipo</th><th>Status</th></tr></thead>
      <tbody>
        ${items.map(i=>`<tr>
          <td style="color:var(--text3)">${i['pk — FareHarbor item ID']||'—'}</td>
          <td style="color:var(--white);max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${i['name — item name (exact FareHarbor name)']||'—'}</td>
          <td><span class="cat-tag">${i['category — dashboard category']||getTourCategory(i['name — item name (exact FareHarbor name)'])}</span></td>

          <td>${i['duration_hrs — approximate duration']?i['duration_hrs — approximate duration']+' hrs':'—'}</td>
          <td>${i['booking_type — colectivo or privado or renta']||'—'}</td>

      </tbody>

    <div style="padding:8px 12px;background:var(--dark2);border:1px solid var(--border);border-radius:4px;font-size:10px;color:var(--text3)">
      Para agregar items: Google Sheets → <strong style="color:var(--teal)">Items</strong>
    </div>`;
}

// ---- DETAIL PANELS ----
function toggleDetail(id){
  const p=document.getElementById('detail-'+id);
  if(!p)return;
  const vis=p.classList.contains('vis');
  document.querySelectorAll('.detail').forEach(x=>x.classList.remove('vis'));
  if(!vis){p.classList.add('vis');p.scrollIntoView({behavior:'smooth',block:'nearest'});}
}
function closeDetail(){document.querySelectorAll('.detail').forEach(p=>p.classList.remove('vis'));}

loadAll();
</script>
</body>
